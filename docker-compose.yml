version: '3.8'

services:
  postgres: 
    image: postgres:16-alpine
    container_name: productcatalog-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ProductCatalogDb
    ports: 
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - productcatalog-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: productcatalog-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - productcatalog-network

  api: 
    build: 
      context: .
      dockerfile: src/ProductCatalog.API/Dockerfile
    container_name:  productcatalog-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=ProductCatalogDb;Username=postgres;Password=postgres"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    ports:
      - "5000:8080"
    depends_on: 
      - postgres
      - rabbitmq
    networks:
      - productcatalog-network

volumes:
  postgres-data: 
  rabbitmq-data: 

networks:
  productcatalog-network:
    driver: bridge